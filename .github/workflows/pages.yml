name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        run: |
          git clone https://github.com/${{ github.repository }}.git /tmp/repo
          cp -r /tmp/repo/docs $GITHUB_WORKSPACE/docs
      
      - name: Verify deployment
        run: |
          echo "✅ Ready to deploy /docs folder"
          ls -la $GITHUB_WORKSPACE/docs/
