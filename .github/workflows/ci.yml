name: CI

on:
  push:
    branches: [main]

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }}.git repo

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run broker tests
        run: |
          cd repo/switchboard_refactored/switchboard
          cargo test --workspace --locked --verbose

      - name: Build release broker
        run: |
          cd repo/switchboard_refactored/switchboard
          cargo build --release --bin switchboard

      - name: WebSocket smoke test
        run: |
          cd repo/switchboard_refactored/switchboard
          nohup ./target/release/switchboard --port 7777 > /tmp/switchboard.log 2>&1 &
          for i in $(seq 1 20); do ss -ltn | grep -q ":7777" && break || sleep 1; done
          cd ../../..
          npm install ws
          node tools/demo_ws_test.js
