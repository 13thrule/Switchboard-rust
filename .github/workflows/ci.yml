name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo test
        run: |
          cd switchboard_refactored/switchboard
          cargo test --workspace --all-features --locked --verbose

      - name: Build release binary
        run: |
          cd switchboard_refactored/switchboard
          cargo build --release --bin switchboard

      - name: Start switchboard server
        run: |
          cd switchboard_refactored/switchboard
          nohup ./target/release/switchboard --port 7777 > /tmp/switchboard.log 2>&1 &
          # wait for server to start
          for i in $(seq 1 10); do
            ss -ltn | grep -q ":7777" && break || sleep 1
          done

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '18'

      - name: Run headless Node demo
        run: |
          npm init -y
          npm install ws
          node tools/demo_ws_test.js

  browser_demo:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release binary
        run: |
          cd switchboard_refactored/switchboard
          cargo build --release --bin switchboard

      - name: Start switchboard server
        run: |
          cd switchboard_refactored/switchboard
          nohup ./target/release/switchboard --port 7777 > /tmp/switchboard.log 2>&1 &
          for i in $(seq 1 10); do ss -ltn | grep -q ":7777" && break || sleep 1; done

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '18'

      - name: Install Playwright
        run: |
          npm init -y
          npm i -D playwright
          npx playwright install --with-deps

      - name: Run Playwright demo
        run: |
          node tools/playwright_demo.js
